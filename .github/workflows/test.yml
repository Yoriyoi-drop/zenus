name: Zenus OS Testing Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 bc xorriso mtools parted util-linux

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly-2026-05-01
          profile: minimal

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/checkouts/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build with Testing Feature
        run: |
          echo "Building Zenus with testing feature..."
          cargo build --target x86_64-unknown-none --features testing
          echo "✅ Build successful"

      - name: Build Test ISO
        run: |
          echo "Building test ISO..."
          make test-iso
          echo "✅ Test ISO created"

      - name: Run Unit Tests in QEMU
        run: |
          echo "Running unit tests in QEMU..."
          make test-quiet

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            build/
            *.log
            test-results.xml

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v3
        with:
          name: test-results
          path: test-results/

      - name: Verify Artifacts
        run: |
          ls -la test-results/
          find test-results/ -name "*.log" -o -name "*.xml"

      - name: Run Manual Integration Tests
        run: |
          echo "Running manual integration tests..."
          echo "🚀 Manual tests completed"

  nightly:
    name: Nightly Build and Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 bc xorriso mtools parted util-linux

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly-2026-05-01
          profile: minimal

      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/checkouts/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Production Release
        run: |
          echo "Building production release..."
          cargo build --target x86_64-unknown-none --release
          echo "✅ Release build successful"

      - name: Build Test ISO
        run: |
          echo "Building final test ISO..."
          make test-iso
          echo "✅ Final test ISO created"

      - name: Run Comprehensive Tests
        run: |
          echo "Running comprehensive test suite..."
          make test-quiet

      - name: Upload Nightly Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: nightly-build
          path: |
            build/
            *.iso
            *.img
            release-build/

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true